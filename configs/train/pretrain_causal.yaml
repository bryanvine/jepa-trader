# Headline run: causal latent-forecasting JEPA (predict future patches in latent space).
data_dir: /apps/jepa-trader/data/spy_qqq_lob
window: 128
stride: 8
val_stride: 64
batch_size: 1024
num_workers: 8

mask:
  variant: causal      # causal | block | mixed
  min_ctx: 4           # randomized causal: context length ~ U[4,15] patches each step
  max_ctx: 15          # -> trains all context positions; varied forecast difficulty
  ctx_frac: 0.5        # (used only if min_ctx unset)
  min_block: 2
  max_block: 6

optim:
  lr: 1.0e-3
  weight_decay: 0.04
  betas: [0.9, 0.95]
  grad_clip: 1.0

schedule:
  total_steps: 12000
  warmup_steps: 1000

ema:
  base: 0.998          # slower target drift -> more stable moving goalpost
  final: 1.0

log_every: 100
val_every: 1000
val_batches: 60
out_dir: /apps/jepa-trader/experiments
run_name: jepa_causal_v2
seed: 0
