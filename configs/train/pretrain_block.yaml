# Block/masked JEPA (I-JEPA style): predict a masked contiguous block from the
# surrounding context. Interpolation -> stable training, trains all positions.
data_dir: /apps/jepa-trader/data/spy_qqq_lob
window: 128
stride: 8
val_stride: 64
batch_size: 1024
num_workers: 8

mask:
  variant: block
  min_block: 2         # mask 2..6 of 16 patches (12.5%..37.5%)
  max_block: 6

optim:
  lr: 1.0e-3
  weight_decay: 0.04
  betas: [0.9, 0.95]
  grad_clip: 1.0

schedule:
  total_steps: 12000
  warmup_steps: 1000

ema:
  base: 0.998
  final: 1.0

log_every: 100
val_every: 1000
val_batches: 60
out_dir: /apps/jepa-trader/experiments
run_name: jepa_block_v3
seed: 0
