# Lower-frequency arm: 15-minute equity bars (~450 symbols, ~1 year from live DB).
# Horizons in bars: 1->15m, 2->30m, 4->1h, 8->2h, 16->4h, 32->8h, 64->16h(~1 day).
bars_csv: /apps/jepa-trader/data/raw_bars/bars_15m.csv
bar_minutes: 15
window: 64
horizons: [1, 2, 4, 8, 16, 32, 64]
min_segment_rows: 96
assumed_spread_bps: 2.0          # round-trip spread estimate for liquid equities
max_date: "2026-02-28"           # dense period only (448 sym); after Feb universe collapses to ~82
splits:
  train_end: "2025-12-31"        # train: Jun .. Dec 2025  (~1.6M rows)
  val_end:   "2026-01-31"        # val:   Jan 2026         (~235k)
  # test: Feb 2026               (~235k)
norm_clip: 10.0
out_dir: /apps/jepa-trader/data/bars_15m
